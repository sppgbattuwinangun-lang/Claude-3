name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site
          # Copy semua file/folder yang relevan ke _site
          cp -f index.html _site/
          cp -f login.html _site/ 2>/dev/null || true
          cp -f app.html _site/ 2>/dev/null || true
          cp -f .nojekyll _site/ 2>/dev/null || touch _site/.nojekyll
          cp -r assets _site/assets 2>/dev/null || true
          # Optional README
          cp -f README.md.mbg _site/README.md 2>/dev/null || true

          echo "=== Site contents ==="
          ls -la _site/
          echo "=== Assets ==="
          ls -la _site/assets/ 2>/dev/null
          echo "=== JS files ==="
          ls -la _site/assets/js/ 2>/dev/null

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
