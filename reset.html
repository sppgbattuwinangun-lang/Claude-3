<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset MBG Monitor</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a1a, #1a0f2e);
      color: #e2e8f0;
      min-height: 100vh;
      display: grid; place-items: center;
    }
    .card {
      max-width: 560px; width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 32px 28px;
      backdrop-filter: blur(20px);
    }
    h1 {
      margin: 0 0 8px 0; font-size: 22px;
      background: linear-gradient(135deg, #6366f1, #ec4899);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin: 0 0 12px 0; }
    .log {
      background: rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px; padding: 14px;
      font-family: ui-monospace, "Courier New", monospace; font-size: 12px;
      max-height: 240px; overflow: auto; margin: 16px 0;
      white-space: pre-wrap; word-break: break-word;
    }
    .log .ok { color: #6ee7b7; }
    .log .warn { color: #fcd34d; }
    .log .err { color: #fca5a5; }
    .log .info { color: #93c5fd; }
    button, .btn {
      display: inline-block;
      padding: 12px 22px; font-size: 14px; font-weight: 600;
      border: 0; border-radius: 12px; cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #a855f7); color: white;
      text-decoration: none; margin: 4px;
      transition: transform .15s, box-shadow .15s;
    }
    button:hover, .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(99,102,241,.4); }
    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,.2);
      color: #cbd5e1;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 18px; }
    .ver { font-size: 11px; color: #64748b; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔧 Reset MBG Monitor</h1>
    <p>Halaman ini akan membersihkan SEMUA cache &amp; data lokal browser untuk MBG Monitor, lalu mengarahkan ke halaman login. Gunakan ini bila aplikasi terlihat blank / data lama tidak hilang.</p>

    <div class="log" id="log">Menjalankan pembersihan total…</div>

    <div class="actions">
      <a class="btn" href="./login.html?reset=1" id="goLogin">Lanjut ke Login</a>
      <button class="btn btn-ghost" onclick="runReset(true)">Reset Ulang</button>
    </div>
    <div class="ver">Cache buster: <span id="ts"></span></div>
  </div>

  <script>
    const log = document.getElementById('log');
    function add(msg, cls) {
      const span = document.createElement('div');
      span.className = cls || '';
      span.textContent = msg;
      log.appendChild(span);
      log.scrollTop = log.scrollHeight;
    }
    document.getElementById('ts').textContent = Date.now() + ' · ' + new Date().toLocaleString('id-ID');

    async function runReset(manual) {
      log.innerHTML = '';
      add('1. Menghapus localStorage (semua key mbg.*)…', 'info');
      try {
        let removed = 0;
        for (let i = localStorage.length - 1; i >= 0; i--) {
          const k = localStorage.key(i);
          if (k && k.startsWith('mbg.')) { localStorage.removeItem(k); removed++; }
        }
        add('   → Removed ' + removed + ' keys', 'ok');
      } catch (e) { add('   ✗ ' + e.message, 'err'); }

      add('2. Menghapus sessionStorage…', 'info');
      try { sessionStorage.clear(); add('   → OK', 'ok'); }
      catch (e) { add('   ✗ ' + e.message, 'err'); }

      add('3. Unregister Service Workers…', 'info');
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          if (regs.length === 0) {
            add('   → tidak ada SW (OK)', 'ok');
          } else {
            for (const r of regs) {
              await r.unregister();
              add('   → unregistered: ' + (r.scope || '?'), 'ok');
            }
          }
        } else {
          add('   → SW API tidak tersedia (OK)', 'ok');
        }
      } catch (e) { add('   ✗ ' + e.message, 'err'); }

      add('4. Menghapus Cache Storage (PWA cache)…', 'info');
      try {
        if ('caches' in window) {
          const names = await caches.keys();
          for (const n of names) {
            await caches.delete(n);
            add('   → deleted: ' + n, 'ok');
          }
          if (!names.length) add('   → tidak ada cache (OK)', 'ok');
        } else {
          add('   → Cache API tidak tersedia (OK)', 'ok');
        }
      } catch (e) { add('   ✗ ' + e.message, 'err'); }

      add('5. Selesai!', 'ok');
      add('', '');
      add('▶ Klik "Lanjut ke Login" untuk lanjut.', 'info');
      add('  Atau tekan Ctrl+Shift+R / Cmd+Shift+R sekarang untuk hard-reload.', 'info');

      if (manual) {
        // Auto-redirect setelah 1.5 detik kalau diklik tombol
        setTimeout(() => {
          location.href = './login.html?reset=' + Date.now();
        }, 1500);
      }
    }

    // Update link "Lanjut ke Login" dengan cache buster
    document.getElementById('goLogin').href = './login.html?reset=' + Date.now();

    // Auto-jalankan saat halaman load
    runReset(false);
  </script>
</body>
</html>
