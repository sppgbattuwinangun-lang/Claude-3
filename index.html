<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPPG - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            top: -150px; right: -150px;
            border-radius: 50%;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
            bottom: -100px; left: -100px;
            border-radius: 50%;
        }
        .login-wrapper {
            width: 100%; max-width: 420px; padding: 24px; z-index: 10;
        }
        .login-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 36px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-logo {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px; color: white;
            box-shadow: 0 12px 32px rgba(59,130,246,0.4);
        }
        .login-card h1 {
            text-align: center; color: #f1f5f9;
            font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
        }
        .login-card p.subtitle {
            text-align: center; color: #94a3b8;
            font-size: 14px; margin-bottom: 32px;
        }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label {
            display: block; color: #94a3b8;
            font-size: 12px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .form-group .input-wrap {
            position: relative;
        }
        .form-group .input-wrap i {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%); color: #64748b; font-size: 16px;
        }
        .form-group input {
            width: 100%; padding: 14px 16px 14px 48px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #f1f5f9;
            font-size: 15px; font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        .form-group input::placeholder { color: #475569; }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59,130,246,0.05);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }
        .btn-login {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none; border-radius: 12px;
            color: white; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(59,130,246,0.4);
        }
        .btn-login:active { transform: translateY(0); }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 10px; padding: 12px 16px;
            color: #fca5a5; font-size: 13px;
            margin-top: 16px; display: none;
            text-align: center;
        }
        .error-msg.show { display: block; animation: shake 0.3s ease; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .login-footer {
            text-align: center; margin-top: 24px;
            color: #475569; font-size: 12px;
        }
        .credentials-hint {
            margin-top: 20px; padding: 12px;
            background: rgba(59,130,246,0.05);
            border: 1px solid rgba(59,130,246,0.15);
            border-radius: 10px;
        }
        .credentials-hint p {
            color: #94a3b8; font-size: 11px; margin: 2px 0;
        }
        .credentials-hint p strong { color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-utensils"></i>
            </div>
            <h1>SPPG</h1>
            <p class="subtitle">Sistem Pengelolaan Pesanan Gizi</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrap">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Masukkan username" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Masukkan password" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt me-2"></i>Masuk
                </button>
                <div class="error-msg" id="errorMsg">
                    <i class="fas fa-exclamation-circle me-1"></i>
                    <span id="errorText">Username atau password salah!</span>
                </div>
            </form>
            
            <div class="credentials-hint">
                <p><strong>Admin:</strong> admin / admin123</p>
                <p><strong>Operator:</strong> operator / operator123</p>
            </div>
        </div>
        <div class="login-footer">
            &copy; 2024 SPPG Battu Winangun
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Admin accounts
        const USERS = [
            { username: 'admin', password: 'admin123', name: 'Administrator', role: 'admin' },
            { username: 'operator', password: 'operator123', name: 'Operator', role: 'operator' }
        ];

        // Check if already logged in
        const session = JSON.parse(localStorage.getItem('sppg_session') || 'null');
        if (session) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            const user = USERS.find(u => u.username === username && u.password === password);
            
            if (user) {
                localStorage.setItem('sppg_session', JSON.stringify({
                    username: user.username,
                    name: user.name,
                    role: user.role,
                    loginTime: new Date().toISOString()
                }));
                window.location.href = 'dashboard.html';
            } else {
                const err = document.getElementById('errorMsg');
                err.classList.add('show');
                setTimeout(() => err.classList.remove('show'), 3000);
            }
        });
    </script>
</body>
</html>
